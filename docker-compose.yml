version: "3.9"

services:
  # ──────────────────────────────────────────────
  # PostgreSQL 16 + pgvector
  # ──────────────────────────────────────────────
  db:
    image: pgvector/pgvector:pg16
    container_name: notelm_db
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-notelm}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-notelm_secret}
      POSTGRES_DB: ${POSTGRES_DB:-notelm}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-notelm} -d ${POSTGRES_DB:-notelm}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - notelm_net

  # ──────────────────────────────────────────────
  # Redis 7
  # ──────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: notelm_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --loglevel warning
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - notelm_net

  # ──────────────────────────────────────────────
  # FastAPI Backend
  # ──────────────────────────────────────────────
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: notelm_api
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-notelm}:${POSTGRES_PASSWORD:-notelm_secret}@db:5432/${POSTGRES_DB:-notelm}
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - notelm_net
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # ──────────────────────────────────────────────
  # Hocuspocus (Real-time Collaboration)
  # NOTE: Uncomment in Phase 6 when Hocuspocus service is implemented
  # ──────────────────────────────────────────────
  # hocuspocus:
  #   build:
  #     context: ./hocuspocus
  #     dockerfile: Dockerfile
  #   container_name: notelm_hocuspocus
  #   restart: unless-stopped
  #   env_file: .env
  #   environment:
  #     REDIS_URL: redis://redis:6379/1
  #     HOCUSPOCUS_SECRET: ${HOCUSPOCUS_SECRET}
  #   ports:
  #     - "1234:1234"
  #   depends_on:
  #     redis:
  #       condition: service_healthy
  #   networks:
  #     - notelm_net

volumes:
  postgres_data:
  redis_data:

networks:
  notelm_net:
    driver: bridge
